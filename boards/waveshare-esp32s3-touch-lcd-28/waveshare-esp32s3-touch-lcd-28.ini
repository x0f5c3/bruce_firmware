; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:waveshare-esp32s3-touch-lcd-28]
board = waveshare-esp32s3-touch-lcd-28
board_build.partitions = custom_16Mb.csv
build_src_filter = ${env.build_src_filter} +<../boards/waveshare-esp32s3-touch-lcd-28>
build_flags =
	${env.build_flags}
	-Iboards/waveshare-esp32s3-touch-lcd-28
	-DCORE_DEBUG_LEVEL=1
	-DBOARD_HAS_PSRAM=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DWAVESHARE_ESP32S3_TOUCH_LCD_28=1

	;Features Enabled

	;Can run USB as HID
	-DUSB_as_HID=1
	-DBAD_TX=GROVE_SDA
	-DBAD_RX=GROVE_SCL

	;Buttons configuration
	-DHAS_BTN=1
	-DBTN_ALIAS='"Boot"'
	-DBTN_PIN=0
	-DBTN_ACT=LOW

	;Infrared LED (no dedicated pin – user configures via Bruce settings)
	-DTXLED=-1
	-DLED_ON=HIGH
	-DLED_OFF=LOW

	;Serial / GPS
	-DSERIAL_TX=43
	-DSERIAL_RX=44
	-DGPS_SERIAL_TX=SERIAL_TX
	-DGPS_SERIAL_RX=SERIAL_RX

	;Touch – CST328 on I2C0 (SDA=1, SCL=3, INT=4, RST=2)
	-DHAS_TOUCH=1
	-DHAS_CAPACITIVE_TOUCH=1
	-DCST328_I2C_ADDR=0x5A
	-DCST328_I2C_SDA=1
	-DCST328_I2C_SCL=3
	-DCST328_INT_PIN=4
	-DCST328_RST_PIN=2

	;RTC – PCF85063 on I2C0
	-DHAS_RTC
	-DHAS_RTC_PCF85063A
	-DRTC_SDA=1
	-DRTC_SCL=3

	;I2C / Grove
	-DGROVE_SDA=1
	-DGROVE_SCL=3

	;General-purpose SPI bus for external modules (CC1101, NRF24, etc.)
	; ESP32-S3 SPI2 IOMUX native lines
	-DSPI_SCK_PIN=12
	-DSPI_MOSI_PIN=11
	-DSPI_MISO_PIN=13
	-DSPI_SS_PIN=10

	;CC1101 (comment out if not connected)
	;-DUSE_CC1101_VIA_SPI
	-DCC1101_GDO0_PIN=9
	-DCC1101_SS_PIN=10
	-DCC1101_MOSI_PIN=SPI_MOSI_PIN
	-DCC1101_SCK_PIN=SPI_SCK_PIN
	-DCC1101_MISO_PIN=SPI_MISO_PIN

	;NRF24L01 (comment out if not connected)
	;-DUSE_NRF24_VIA_SPI
	-DNRF24_CE_PIN=9
	-DNRF24_SS_PIN=10
	-DNRF24_MOSI_PIN=SPI_MOSI_PIN
	-DNRF24_SCK_PIN=SPI_SCK_PIN
	-DNRF24_MISO_PIN=SPI_MISO_PIN

	;SD Card (not fitted on this board)
	-DSDCARD_CS=-1
	-DSDCARD_SCK=SPI_SCK_PIN
	-DSDCARD_MISO=SPI_MISO_PIN
	-DSDCARD_MOSI=SPI_MOSI_PIN

	;TFT – ST7789 240x320 via SPI3 (HSPI port), 40 MHz
	-DHAS_SCREEN=1
	-DUSER_SETUP_LOADED=1
	-DUSE_HSPI_PORT=1
	-DST7789_DRIVER=1
	-DTFT_WIDTH=240
	-DTFT_HEIGHT=320
	-DTFT_INVERSION_ON
	-DTFT_MOSI=45
	-DTFT_SCLK=40
	-DTFT_CS=42
	-DTFT_DC=41
	-DTFT_RST=39
	-DTFT_MISO=-1
	-DTFT_BL=5
	-DTFT_BACKLIGHT_ON=HIGH
	-DTOUCH_CS=-1
	-DSMOOTH_FONT=1
	-DSPI_FREQUENCY=40000000
	-DSPI_READ_FREQUENCY=20000000

	;Display / UI
	-DROTATION=1
	-DMINBRIGHT=1
	-DBACKLIGHT=TFT_BL

	;Font sizes
	-DFP=1
	-DFM=2
	-DFG=3

	;Partition
	-DPART_16MB=1

	;Deep sleep
	-DDEEPSLEEP_WAKEUP_PIN=0
	-DDEEPSLEEP_PIN_ACT=LOW

	-DDEVICE_NAME='"Waveshare ESP32-S3-Touch-LCD-2.8"'

upload_speed = 921600
monitor_speed = 115200
